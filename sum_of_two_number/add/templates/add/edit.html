
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Sum of two number</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="container-md text-center">
        <h3> Edit Details </h3>
    </div>
    <br>
    <div class="container-md ">
        <form action="" method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="exampleInputfirstNumber" class="form-label">Input First Number</label>
                <input type="number" class="form-control" id="exampleInputfirstNumber" name="update_number_one" value='{{operation_list.number_one}}' required>
            </div>
            <div class="mb-3">
                <label for="exampleInputsecoundNumber" class="form-label">Input Secound Number</label>
                <input type="number" class="form-control" id="exampleInputsecoundNumber" name="update_number_two" value='{{operation_list.number_two}}' required>
            </div>
            <button type="submit" class="btn btn-primary">Update Result</button>
        </form>
    </div>
    <br>
    <br>
    
</body>
</html>
